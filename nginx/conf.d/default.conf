server {
  listen 80;

  # Docker 내장 DNS 리졸버 — 컨테이너 재시작 후 IP 변경 시 동적 재해석 (30s 캐시)
  resolver 127.0.0.11 valid=30s ipv6=off;

  # gzip 압축 — API JSON 응답 크기 ~80% 감소 (병목 5 개선)
  gzip on;
  gzip_types application/json text/plain text/css application/javascript text/javascript text/xml application/xml;
  gzip_min_length 1024;
  gzip_comp_level 4;
  gzip_vary on;
  gzip_proxied any;

  # Security headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # Next.js 15 SSR 하이드레이션은 인라인 스크립트를 사용하므로 unsafe-inline 필요
  # (nonce 기반 CSP 도입 전까지 유지)
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: http://localhost:8929; connect-src 'self'; font-src 'self'; frame-src 'self' blob:; object-src blob: 'self'; frame-ancestors 'none';" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Chrome DevTools workspace detection (Chrome 130+)
  location = /.well-known/appspecific/com.chrome.devtools.json {
    return 200 '{}';
    add_header Content-Type application/json;
  }

  location / {
    proxy_pass http://itsm-web:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_cache_bypass $http_upgrade;
  }

  # SSE (Server-Sent Events) — 버퍼링 비활성화 필수
  # set 변수 사용으로 resolver가 매 요청마다 DNS 재해석 (컨테이너 재시작 내성)
  location /api/notifications/stream {
    set $sse_upstream http://itsm-api:8000/notifications/stream;
    proxy_pass $sse_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
    proxy_connect_timeout 10s;
    chunked_transfer_encoding on;
    gzip off;
  }

  # 티켓 실시간 협업 WebSocket
  location ~ ^/api/ws/tickets/ {
    set $ws_upstream http://itsm-api:8000;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $ws_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 86400s;
  }

  # 티켓 실시간 이벤트 SSE 스트림 — 버퍼링 비활성화
  location ~ ^/api/tickets/[0-9]+/stream {
    set $ticket_sse_upstream http://itsm-api:8000;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass $ticket_sse_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header Connection '';
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
    proxy_connect_timeout 10s;
    chunked_transfer_encoding on;
    gzip off;
  }

  # 파일 프록시 — iframe 미리보기 허용을 위해 frame-ancestors를 'self'로 오버라이드
  # (서버 블록 전체의 frame-ancestors 'none' 을 이 location에서만 예외 처리)
  # proxy_hide_header: FastAPI/미들웨어가 보내는 X-Frame-Options: DENY를 제거해 중복 방지
  location /api/tickets/uploads/proxy {
    proxy_hide_header X-Frame-Options;
    proxy_hide_header x-frame-options;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'self';" always;
    proxy_pass http://itsm-api:8000/tickets/uploads/proxy;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Health check endpoint — used by Docker healthcheck
  location = /health {
    proxy_pass http://itsm-api:8000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
  }

  location /api/ {
    proxy_pass http://itsm-api:8000/;
    proxy_redirect http://itsm-api:8000/ /api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    client_max_body_size 20m;  # FastAPI 10MB 검사 앞단에서 막히지 않도록 여유값 설정
  }

  # HIGH-07: 이 파일은 더 이상 사용되지 않습니다.
  # nginx/templates/default.conf.template 을 사용하고 docker-compose에서
  # METRICS_TOKEN 환경변수를 설정하세요. (envsubst 자동 처리)
  location = /metrics {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    # 아래 값은 .env의 METRICS_TOKEN으로 대체됨 (templates/default.conf.template 사용)
    set $metrics_expected "CHANGE_THIS_TO_A_STRONG_SECRET";
    if ($http_x_metrics_token != $metrics_expected) {
      return 403;
    }
    proxy_pass http://itsm-api:8000/metrics;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Swagger UI / ReDoc — 내부망 IP만 허용 + CDN CSP 오버라이드
  location /docs {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    # Swagger UI가 cdn.jsdelivr.net 과 fastapi.tiangolo.com 에서 JS/CSS/파비콘을 로드함
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https://fastapi.tiangolo.com; connect-src 'self'; font-src 'self' https://cdn.jsdelivr.net; frame-ancestors 'none';" always;
    proxy_pass http://itsm-api:8000/docs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /docs/oauth2-redirect {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https://fastapi.tiangolo.com; connect-src 'self'; font-src 'self' https://cdn.jsdelivr.net; frame-ancestors 'none';" always;
    proxy_pass http://itsm-api:8000/docs/oauth2-redirect;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /redoc {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    # ReDoc도 cdn.jsdelivr.net 에서 번들을 로드함
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https://fastapi.tiangolo.com; connect-src 'self'; font-src 'self' https://cdn.jsdelivr.net; frame-ancestors 'none';" always;
    proxy_pass http://itsm-api:8000/redoc;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location /openapi.json {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    proxy_pass http://itsm-api:8000/openapi.json;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Celery Flower 모니터링 (내부망 전용)
  location /flower/ {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    proxy_pass http://flower:5555/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  # Grafana 대시보드 (내부망 전용)
  location /grafana/ {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    proxy_pass http://grafana:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Prometheus (내부망 전용)
  location /prometheus/ {
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    proxy_pass http://prometheus:9090/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
}
