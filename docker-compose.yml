services:

  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    restart: unless-stopped
    shm_size: "256m"
    ports:
      - "8929:8929"
      - "2224:22"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8929'
        gitlab_rails['initial_root_password'] = '${GITLAB_ROOT_PASSWORD}'
    volumes:
      - gitlab_config:/etc/gitlab
      - gitlab_logs:/var/log/gitlab
      - gitlab_data:/var/opt/gitlab
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8929/-/health"]
      interval: 60s
      timeout: 10s
      retries: 10
      start_period: 300s

  postgres:
    image: postgres:17
    container_name: itsm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - itsm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - itsm_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  clamav:
    image: clamav/clamav:1.4
    platform: linux/amd64
    restart: unless-stopped
    volumes:
      - itsm_clamav:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "echo PING | nc -w 3 localhost 3310 | grep -q PONG || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  # ---------------------------------------------------------------------
  # itsm-api
  # 로컬 개발: docker-compose.override.yml 의 build: 지시어가 우선 적용됨
  # CI 배포:  IMAGE_API / IMAGE_API_TAG 환경변수로 레지스트리 이미지 사용
  # ---------------------------------------------------------------------
  itsm-api:
    image: ${IMAGE_API:-itsm-api}:${IMAGE_API_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-30}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      GITLAB_API_URL: ${GITLAB_API_URL:-http://gitlab:8929}
      GITLAB_EXTERNAL_URL: ${GITLAB_EXTERNAL_URL:-http://localhost:8929}
      GITLAB_PROJECT_ID: ${GITLAB_PROJECT_ID}
      GITLAB_PROJECT_TOKEN: ${GITLAB_PROJECT_TOKEN}
      GITLAB_GROUP_ID: ${GITLAB_GROUP_ID:-}
      GITLAB_GROUP_TOKEN: ${GITLAB_GROUP_TOKEN:-}
      GITLAB_OAUTH_CLIENT_ID: ${GITLAB_OAUTH_CLIENT_ID}
      GITLAB_OAUTH_CLIENT_SECRET: ${GITLAB_OAUTH_CLIENT_SECRET}
      GITLAB_OAUTH_REDIRECT_URI: ${GITLAB_OAUTH_REDIRECT_URI}
      SECRET_KEY: ${SECRET_KEY}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      GITLAB_WEBHOOK_SECRET: ${GITLAB_WEBHOOK_SECRET:-}
      ITSM_WEBHOOK_URL: ${ITSM_WEBHOOK_URL:-http://itsm-api:8000/webhooks/gitlab}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-ITSM Portal <noreply@company.com>}
      SMTP_TLS: ${SMTP_TLS:-true}
      NOTIFICATION_ENABLED: ${NOTIFICATION_ENABLED:-false}
      IT_TEAM_EMAIL: ${IT_TEAM_EMAIL:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8111}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      MAX_ACTIVE_SESSIONS: ${MAX_ACTIVE_SESSIONS:-5}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
      CLAMAV_PORT: ${CLAMAV_PORT:-3310}
      CLAMAV_ENABLED: ${CLAMAV_ENABLED:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      GITLAB_BOT_USERNAME: ${GITLAB_BOT_USERNAME:-}
      ADMIN_ALLOWED_CIDRS: ${ADMIN_ALLOWED_CIDRS:-}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      CLAMAV_STRICT: ${CLAMAV_STRICT:-true}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-itsm-api}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio_secret_change_me}
      MINIO_BUCKET: ${MINIO_BUCKET:-itsm-attachments}
      MINIO_SECURE: ${MINIO_SECURE:-false}
    volumes:
      - gitlab_data:/gitlab_data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clamav:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------
  # celery-worker
  # 이메일·Telegram·웹훅 알림을 비동기로 처리하는 Celery worker
  # ---------------------------------------------------------------------
  celery-worker:
    image: ${IMAGE_API:-itsm-api}:${IMAGE_API_TAG:-latest}
    restart: unless-stopped
    command: celery -A app.celery_app:celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GITLAB_API_URL: ${GITLAB_API_URL:-http://gitlab:8929}
      GITLAB_EXTERNAL_URL: ${GITLAB_EXTERNAL_URL:-http://localhost:8929}
      GITLAB_PROJECT_ID: ${GITLAB_PROJECT_ID}
      GITLAB_PROJECT_TOKEN: ${GITLAB_PROJECT_TOKEN}
      GITLAB_GROUP_ID: ${GITLAB_GROUP_ID:-}
      GITLAB_GROUP_TOKEN: ${GITLAB_GROUP_TOKEN:-}
      GITLAB_OAUTH_CLIENT_ID: ${GITLAB_OAUTH_CLIENT_ID}
      GITLAB_OAUTH_CLIENT_SECRET: ${GITLAB_OAUTH_CLIENT_SECRET}
      GITLAB_OAUTH_REDIRECT_URI: ${GITLAB_OAUTH_REDIRECT_URI}
      SECRET_KEY: ${SECRET_KEY}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-ITSM Portal <noreply@company.com>}
      SMTP_TLS: ${SMTP_TLS:-true}
      NOTIFICATION_ENABLED: ${NOTIFICATION_ENABLED:-false}
      IT_TEAM_EMAIL: ${IT_TEAM_EMAIL:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8111}
    volumes:
      - gitlab_data:/gitlab_data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "app.celery_app:celery_app", "inspect", "ping", "--timeout", "5"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------
  # celery-beat
  # Celery Beat 스케줄러 — 주기 태스크(SLA 체크·스냅샷·유저 동기화) 발행
  # ---------------------------------------------------------------------
  celery-beat:
    image: ${IMAGE_API:-itsm-api}:${IMAGE_API_TAG:-latest}
    restart: unless-stopped
    command: celery -A app.celery_app:celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GITLAB_API_URL: ${GITLAB_API_URL:-http://gitlab:8929}
      GITLAB_EXTERNAL_URL: ${GITLAB_EXTERNAL_URL:-http://localhost:8929}
      GITLAB_PROJECT_ID: ${GITLAB_PROJECT_ID}
      GITLAB_PROJECT_TOKEN: ${GITLAB_PROJECT_TOKEN}
      GITLAB_GROUP_ID: ${GITLAB_GROUP_ID:-}
      GITLAB_GROUP_TOKEN: ${GITLAB_GROUP_TOKEN:-}
      GITLAB_OAUTH_CLIENT_ID: ${GITLAB_OAUTH_CLIENT_ID}
      GITLAB_OAUTH_CLIENT_SECRET: ${GITLAB_OAUTH_CLIENT_SECRET}
      GITLAB_OAUTH_REDIRECT_URI: ${GITLAB_OAUTH_REDIRECT_URI}
      SECRET_KEY: ${SECRET_KEY}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-ITSM Portal <noreply@company.com>}
      SMTP_TLS: ${SMTP_TLS:-true}
      NOTIFICATION_ENABLED: ${NOTIFICATION_ENABLED:-false}
      IT_TEAM_EMAIL: ${IT_TEAM_EMAIL:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8111}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_healthy

  # ---------------------------------------------------------------------
  # flower
  # Celery 태스크 모니터링 UI (기본 포트 5555)
  # ---------------------------------------------------------------------
  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    command: celery --broker=redis://:${REDIS_PASSWORD}@redis:6379 flower --port=5555 --url_prefix=flower
    ports:
      - "127.0.0.1:${FLOWER_PORT:-5555}:5555"
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      celery-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5555/flower/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------
  # itsm-web
  # NEXT_PUBLIC_* 변수는 빌드 시 바이너리에 삽입됨 (런타임 변경 불가)
  # CI에서 환경별 이미지를 각각 빌드해 IMAGE_WEB_TAG로 구분
  # ---------------------------------------------------------------------
  itsm-web:
    image: ${IMAGE_WEB:-itsm-web}:${IMAGE_WEB_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      itsm-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8111}:80"
    environment:
      # HIGH-07: metrics 엔드포인트 보호 토큰 — envsubst로 default.conf.template에 주입됨.
      # .env에 METRICS_TOKEN=<strong_random_secret> 설정 필요.
      METRICS_TOKEN: ${METRICS_TOKEN:?METRICS_TOKEN must be set in .env}
    volumes:
      # HIGH-07: nginx:1.19+ 공식 이미지가 /etc/nginx/templates/*.conf.template 파일을
      # envsubst 처리 후 /etc/nginx/conf.d/에 복사함 (컨테이너 시작 시 자동 실행)
      - ./nginx/templates:/etc/nginx/templates:ro
    depends_on:
      - itsm-web
      - itsm-api
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_secret_change_me}
    volumes:
      - itsm_minio:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"  # HIGH-02: localhost만 바인딩 — 외부 노출 방지
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - itsm_prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.external-url=http://localhost:${APP_PORT:-8111}/prometheus/'
      - '--web.route-prefix=/prometheus/'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/prometheus/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"  # HIGH-01: localhost만 바인딩
    environment:
      # HIGH-01: GRAFANA_PASSWORD 미설정 시 빈 문자열 — Grafana가 시작을 거부함
      # 운영 시 반드시 .env에 GRAFANA_PASSWORD=<strong_password> 설정 필요
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env}
      GF_AUTH_DISABLE_SIGNUP: "true"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:${APP_PORT:-8111}/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/01-itsm-operations.json
    volumes:
      - itsm_grafana:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -----------------------------------------------------------------------
  # OpenTelemetry Collector (profiles: ["tracing"] — 선택적 활성화)
  # -----------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    profiles: ["tracing"]
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./monitoring/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
      - "127.0.0.1:8888:8888"   # Prometheus metrics (self)
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:13133/"]
      interval: 30s
      timeout: 5s
      retries: 3

  pg-backup:
    image: postgres:17
    profiles: ["backup"]
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - itsm_backups:/backups
    entrypoint: >
      /bin/sh -c "
        while true; do
          FILENAME=/backups/itsm_$$(date +%Y%m%d_%H%M%S).sql.gz
          pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB | gzip > $$FILENAME
          echo \"Backup created: $$FILENAME\"
          find /backups -name 'itsm_*.sql.gz' -mtime +7 -delete
          sleep 86400
        done
      "
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  itsm_pgdata:
  itsm_redis:
  itsm_backups:
  itsm_prometheus:
  itsm_grafana:
  itsm_clamav:
  itsm_minio:
