name: E2E Tests (Playwright)

on:
  pull_request:
    paths:
      - 'itsm-web/src/**'
      - 'itsm-web/e2e/**'
      - 'itsm-api/app/**'
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: itsm
          POSTGRES_PASSWORD: itsm_test
          POSTGRES_DB: itsm_test
        options: >-
          --health-cmd "pg_isready -U itsm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://itsm:itsm_test@localhost:5432/itsm_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci_test_key_that_is_long_enough_32chars
      GITLAB_URL: http://localhost
      GITLAB_PROJECT_TOKEN: ci_token
      GITLAB_PROJECT_ID: "1"
      ENVIRONMENT: development
      E2E_BASE_URL: http://localhost:8111

    steps:
      - uses: actions/checkout@v4

      # ── API 서버 시작 ──
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: itsm-api/requirements.txt

      - name: Install API dependencies
        working-directory: itsm-api
        run: pip install -r requirements.txt

      - name: Run DB migrations
        working-directory: itsm-api
        run: alembic upgrade head

      - name: Start API server
        working-directory: itsm-api
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/health || exit 1
        env:
          DATABASE_URL: postgresql://itsm:itsm_test@localhost:5432/itsm_test

      - name: Generate E2E admin token
        working-directory: itsm-api
        run: |
          TOKEN=$(python3 -c "
import json, base64, time, sys
from app.auth import create_token, store_gitlab_token
user = {'id': 1, 'username': 'e2e_admin', 'name': 'E2E Admin', 'email': 'e2e@test.com', 'avatar_url': None, 'organization': ''}
token = create_token(user, gitlab_token='e2e_fake_gitlab_token', role='admin')
payload_b64 = token.split('.')[1]
payload_b64 += '=' * (4 - len(payload_b64) % 4)
payload = json.loads(base64.b64decode(payload_b64))
jti = payload['jti']
exp = payload['exp']
ttl = exp - int(time.time())
store_gitlab_token(jti, 'e2e_fake_gitlab_token', ttl)
print(token)
")
          echo "E2E_ADMIN_TOKEN=$TOKEN" >> $GITHUB_ENV

      # ── 프론트엔드 빌드 & 서버 시작 ──
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: itsm-web/package-lock.json

      - name: Install frontend dependencies
        working-directory: itsm-web
        run: npm ci

      - name: Build Next.js
        working-directory: itsm-web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Start Next.js
        working-directory: itsm-web
        run: npm start -- -p 3000 &

      - name: Wait for Next.js to be ready
        run: |
          echo "Waiting for Next.js server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Next.js ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: Next.js did not start within 60s" >&2
          exit 1

      # ── Playwright 설치 및 실행 ──
      - name: Install Playwright browsers
        working-directory: itsm-web
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: itsm-web
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: itsm-web/playwright-report/
          retention-days: 14
