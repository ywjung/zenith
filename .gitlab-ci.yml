stages:
  - lint
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NODE_MODULES_CACHE: "$CI_PROJECT_DIR/itsm-web/node_modules"
  DOCKER_DRIVER: overlay2
  IMAGE_API: $CI_REGISTRY_IMAGE/itsm-api
  IMAGE_WEB: $CI_REGISTRY_IMAGE/itsm-web

# ── Caches ────────────────────────────────────────────────────────────────────

.python-cache: &python-cache
  cache:
    key: pip-$CI_COMMIT_REF_SLUG
    paths:
      - .cache/pip
      - itsm-api/.venv

.node-cache: &node-cache
  cache:
    key: node-$CI_COMMIT_REF_SLUG
    paths:
      - itsm-web/node_modules

# ── Lint ──────────────────────────────────────────────────────────────────────

lint:backend:
  stage: lint
  image: python:3.12-slim
  <<: *python-cache
  before_script:
    - cd itsm-api
    - pip install ruff --quiet
  script:
    - ruff check app/

lint:frontend:
  stage: lint
  image: node:20-alpine
  <<: *node-cache
  before_script:
    - cd itsm-web
    - npm ci --prefer-offline
  script:
    - npm run lint

# ── Test ──────────────────────────────────────────────────────────────────────

test:backend:
  stage: test
  image: python:3.12-slim
  <<: *python-cache
  before_script:
    - cd itsm-api
    - pip install -r requirements-dev.txt --quiet
  script:
    - pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: itsm-api/coverage.xml
    expire_in: 1 week

test:frontend:
  stage: test
  image: node:20-alpine
  <<: *node-cache
  before_script:
    - cd itsm-web
    - npm ci --prefer-offline
  script:
    - npm run test:ci
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: itsm-web/coverage/cobertura-coverage.xml
    expire_in: 1 week

# ── Build ─────────────────────────────────────────────────────────────────────

.build-rules: &build-rules
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

build:api:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  <<: *build-rules
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      TAG=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
      docker build -t $IMAGE_API:$TAG -t $IMAGE_API:latest itsm-api/
      docker push $IMAGE_API:$TAG
      docker push $IMAGE_API:latest

build:web:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  <<: *build-rules
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      TAG=${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}
      docker build -t $IMAGE_WEB:$TAG -t $IMAGE_WEB:latest itsm-web/
      docker push $IMAGE_WEB:$TAG
      docker push $IMAGE_WEB:latest

# ── Deploy ────────────────────────────────────────────────────────────────────

deploy:production:
  stage: deploy
  image: alpine:3.19
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  environment:
    name: production
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST "
        cd $DEPLOY_PATH &&
        docker compose pull &&
        docker compose up -d --remove-orphans
      "
