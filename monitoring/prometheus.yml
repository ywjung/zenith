global:
  scrape_interval:     60s
  scrape_timeout:      10s   # 개별 스크랩 타임아웃 (default 10s 명시)
  evaluation_interval: 60s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  # ── ITSM API (FastAPI + prometheus_fastapi_instrumentator) ─────────────────
  - job_name: 'itsm-api'
    static_configs:
      - targets: ['itsm-api:8000']
    metrics_path: '/metrics'
    scrape_timeout: 10s
    params:
      format: ['prometheus']

  # ── Celery Worker (prometheus_client 내장 메트릭) ───────────────────────────
  - job_name: 'celery-worker'
    static_configs:
      - targets: ['celery-worker:8000']
    metrics_path: '/metrics'
    scrape_timeout: 10s

  # ── Redis (redis_exporter 없이 Celery/API 기반 메트릭 활용) ────────────────
  # 별도 exporter 미사용 — itsm-api의 redis_up 메트릭으로 모니터링

  # ── Prometheus Self-Monitoring ─────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/prometheus/metrics'
    scrape_timeout: 5s
